name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Verify and package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Release tags must use vMAJOR.MINOR.PATCH form"
            exit 1
          fi

          tag_commit="$(git rev-parse --verify "${GITHUB_REF}^{commit}")"
          if ! git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME does not point to a commit on main"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum

      - name: Verify source
        shell: bash
        run: |
          go mod download
          go mod verify
          go mod tidy
          git diff --exit-code -- go.mod go.sum

          files="$(gofmt -l .)"
          if [[ -n "$files" ]]; then
            printf 'Run gofmt on:\n%s\n' "$files"
            exit 1
          fi

          go vet ./...
          go test -race -count=1 ./...
          node --check web/app.js
          go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          targets=(
            darwin/amd64
            darwin/arm64
            linux/amd64
            linux/arm64
            windows/amd64
            windows/arm64
          )

          mkdir -p build dist

          for target in "${targets[@]}"; do
            target_os="${target%/*}"
            target_arch="${target#*/}"
            base="mdshelf_${version}_${target_os}_${target_arch}"
            stage="build/$base"
            binary="$stage/mdshelf"

            mkdir -p "$stage"
            if [[ "$target_os" == "windows" ]]; then
              binary+=".exe"
            fi

            CGO_ENABLED=0 GOOS="$target_os" GOARCH="$target_arch" \
              go build -trimpath -ldflags="-s -w" -o "$binary" .

            cp LICENSE README.md THIRD_PARTY_NOTICES "$stage/"

            if [[ "$target_os" == "windows" ]]; then
              (
                cd "$stage"
                zip -q -r "../../dist/$base.zip" .
              )
            else
              tar -C "$stage" -czf "dist/$base.tar.gz" .
            fi
          done

          (
            cd dist
            sha256sum ./*.tar.gz ./*.zip > SHA256SUMS
          )

      - name: Store release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: dist/
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            --title "MDShelf $GITHUB_REF_NAME" \
            dist/*
