name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify source
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum

      - name: Download and verify modules
        run: |
          go mod download
          go mod verify

      - name: Check module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check formatting
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [[ -n "$files" ]]; then
            printf 'Run gofmt on:\n%s\n' "$files"
            exit 1
          fi

      - name: Vet Go code
        run: go vet ./...

      - name: Check JavaScript syntax
        run: node --check web/app.js

      - name: Scan for known vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Build production binary
        run: go build -trimpath -ldflags="-s -w" -o /tmp/mdshelf .

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum

      - name: Run tests with race detector
        run: go test -race -count=1 ./...
